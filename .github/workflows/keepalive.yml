# Pings the deployed app so Render's free instance never sleeps (→ instant Avito replies).
# Set repo secret PING_URL = https://<your-app>.onrender.com/health
name: keep-alive
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ secrets.PING_URL }}" ]; then
            echo "PING_URL secret not set — skipping"; exit 0
          fi
          curl -fsS --max-time 30 "${{ secrets.PING_URL }}" && echo "  pinged OK" || echo "ping failed (instance may be waking)"
