<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Демо-сайт с виджетом — Nexus Agents</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, sans-serif; margin: 0; color: #14122b; }
    .h { background: linear-gradient(120deg,#ede9fe,#e0e7ff,#fce7f3); padding: 80px 20px; text-align: center; }
    .h h1 { font-size: 40px; margin: 0 0 12px; }
    .h p { color: #6b6982; font-size: 18px; }
    .c { max-width: 760px; margin: 50px auto; padding: 0 20px; }
    .note { background: #f6f7fb; border: 1px dashed #e9e8f2; border-radius: 14px; padding: 18px; color: #6b6982; }
  </style>
</head>
<body>
  <div class="h">
    <h1>🛍️ Магазин «ТехноМир»</h1>
    <p>Это демонстрационный сайт. ИИ-агент уже работает — нажмите кнопку чата справа внизу.</p>
  </div>
  <div class="c">
    <div class="note">💡 Это пример того, как виджет выглядит на реальном сайте клиента. Задайте агенту вопрос — например, «Какие ноутбуки есть в наличии?»</div>
  </div>
  <script>
    const key = new URLSearchParams(location.search).get("key");
    if (key) {
      const s = document.createElement("script");
      s.src = "/widget.js";
      s.setAttribute("data-key", key);
      s.defer = true;
      document.body.appendChild(s);
    } else {
      document.querySelector(".note").textContent = "Не указан ключ канала (?key=...).";
    }
  </script>
</body>
</html>
